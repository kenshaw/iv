on: [push, pull_request]
name: Test
jobs:
  test:
    name: Build
    runs-on: ubuntu-26.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get install -y \
            build-essential \
            libvips \
            libvips-dev \
            libgtk2.0-dev \
            libfftw3-dev \
            libopenexr-dev \
            libgsf-1-dev \
            libglib2.0-dev \
            liborc-dev \
            libopenslide-dev \
            libmatio-dev \
            libwebp-dev \
            libjpeg-turbo8-dev \
            libexpat1-dev \
            libexif-dev \
            libtiff5-dev \
            libpng-dev \
            libarchive-dev \
            libcgif-dev \
            libjxl-dev \
            libcfitsio-dev \
            libpoppler-glib-dev \
            librsvg2-dev \
            libpango1.0-dev \
            libopenjp2-7-dev \
            liblcms2-dev \
            libimagequant-dev
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Build
        run: |
          go build ./...
